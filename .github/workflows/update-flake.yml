name: Update Flake und Build

on:
  schedule:
    - cron: '0 3 * * *'  # täglich 3 Uhr UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update flake.lock
        run: nix flake update

      - name: flake.lock als Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: flake-lock
          path: flake.lock

  build:
    needs: update
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host:
          - void-desktop
          - void-carbonx1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Aktualisierte flake.lock laden
        uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - name: Speicherplatz freigeben
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: elberfeld
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: |
          nix build '.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel' \
            --no-link \
            --print-build-logs

  push:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Aktualisierte flake.lock laden
        uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - name: Commit und push (nur bei Änderungen)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          if git diff --staged --quiet; then
            echo "flake.lock unverändert – kein Commit nötig"
          else
            git commit -m "chore: update flake.lock"
            git push
          fi
